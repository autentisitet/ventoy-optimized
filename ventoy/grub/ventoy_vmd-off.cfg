# Automatically match Ubuntu 24.04.4 (using Ubuntu's native casper scanning logic)
menuentry "Ubuntu 24.04.4 (Safe: VMD Off)" --class ubuntu {
    search --set=root -f /ubuntu-24.04.4-desktop-amd64.iso
    loopback Ubuntu24 /ubuntu-24.04.4-desktop-amd64.iso
    linux (Ubuntu24)/casper/vmlinuz boot=casper iso-scan/filename=/ubuntu-24.04.4-desktop-amd64.iso quiet splash rd.driver.pre=nvme vmd.disable=1 pci=nocrs \
            intel_iommu=off nvme_load=YES nvme_core.default_ps_max_latency_us=0 \
            modprobe.blacklist=vmd
    initrd (Ubuntu24)/casper/initrd
}

